amcl:
  ros__parameters:
    enabled: False # Disabled because we are using VIO/Odom only

bt_navigator:
  ros__parameters:
    global_frame: odom
    robot_base_frame: base_link
    use_sim_time: False
    default_bt_xml_filename: "navigate_to_pose_w_replanning_and_recovery.xml"

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 30.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker: Stops robot if it hasn't moved 0.5m in 10s
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 60.0

    # Goal checker: How close is "close enough"?
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    # Controller (DWB is standard, MPPI is better for irregular obstacles if you have GPU)
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.5
      max_vel_y: 0.25
      max_vel_theta: 1.57
      min_speed_xy: 0.0
      max_speed_xy: 0.5
      min_speed_theta: 0.0
      # Add critics (scoring functions)
      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist
      BaseObstacle.scale: 1.0
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      Oscillation.scale: 1.25

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 15.0
      publish_frequency: 5.0

      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true

      width: 6.0
      height: 6.0
      resolution: 0.05

      always_send_full_costmap: true

      footprint: "[[0.32, 0.15], [0.32, -0.15], [-0.32, -0.15], [-0.32, 0.15]]"

      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        footprint_clearing_enabled: true

        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 12
        max_obstacle_height: 0.6

        unknown_threshold: 10
        mark_threshold: 0
        combination_method: 1

        publish_voxel_map: False

        observation_sources: pointcloud

        pointcloud:
          topic: /obstacle_points
          data_type: "PointCloud2"

          min_obstacle_height: 0.12
          max_obstacle_height: 0.6

          obstacle_max_range: 3.0
          obstacle_min_range: 0.1

          raytrace_max_range: 4.0
          raytrace_min_range: 0.1

          clearing: True
          marking: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35
        cost_scaling_factor: 2.5

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      resolution: 0.05
      footprint: "[ [0.325, 0.15], [0.325, -0.15], [-0.325, -0.15], [-0.325, 0.15] ]"
      plugins: ["voxel_layer", "inflation_layer"]
      # plugins: ["obstacle_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        footprint_clearing_enabled: true
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 12
        max_obstacle_height: 0.6
        unknown_threshold: 10
        mark_threshold: 0
        observation_sources: pointcloud
        combination_method: 1
        pointcloud: # no frame set, uses frame from message
          topic: /obstacle_points
          max_obstacle_height: 0.6
          min_obstacle_height: 0.12
          obstacle_max_range: 3.0
          obstacle_min_range: 0.1
          raytrace_max_range: 4.0
          raytrace_min_range: 0.1
          clearing: True
          marking: True
          data_type: "PointCloud2"
          transport_type: "raw"

      # obstacle_layer:
      #   plugin: "nav2_costmap_2d::ObstacleLayer"
      #   enabled: True
      #   observation_sources: pointcloud
      #   pointcloud:
      #     topic: /obstacle_points
      #     max_obstacle_height: 2.0
      #     min_obstacle_height: 0.0
      #     obstacle_range: 5.0
      #     raytrace_range: 5.0
      #     clearing: True # Since we have no static map, clearing is vital to remove old obstacles
      #     marking: True
      #     data_type: "PointCloud2"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35

planner_server:
  ros__parameters:
    planner_plugin: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid" # Using Hybrid-A* planner
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.25 # 25 cm to goal is good enough
      allow_unknown: true # Can travel in unknown space, since unknown environment
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0 # Planning and smoothing should complete in 5.0 sec
      motion_model_for_search: "DUBIN" # Dubin's model for motion
      angle_quantization_bins: 64 # Docs say 72 but meh whatever
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      analytic_expansion_max_cost: 200.0
      analytic_expansion_max_cost_override: false
      minimum_turning_radius: 0.2 # Can be smaller for the quadruped, as it is holonomic
      reverse_penalty: 2.0 # Penalty to apply if motion reversing
      change_penalty: 0.0
      non-straight_penalty: 1.0 # No wonky-ass paths
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 20.0 # Size of the dubin/reeds-sheep distance window to cache, in meters.
      cache_obstacle_heuristic: false # Cache the obstacle map dynamic programming distance expansion heuristic between subsequent replannings of the same goal location. Dramatically speeds up replanning performance (40x) if costmap is largely static.
      debug_visualizations: false # For Hybrid nodes: Whether to publish expansions on the /expansions topic as an array of poses (the orientation has no meaning) and the path's footprints on the /planned_footprints topic. WARNING: heavy to compute and to display, for debug only as it degrades the performance.
      use_quadratic_cost_penalty: False
      downsample_obstacle_heuristic: True
      allow_primitive_interpolation: False
      coarse_search_resolution: 4 # Number of bins to skip when doing a coarse search for the path. Only used for all_direction goal heading mode.
      goal_heading_mode: "ALL_DIRECTION" # DEFAULT, BIDIRECTIONAL, ALL_DIRECTION* (Just get to the goal, whatever orientation)
      smooth_path: True # If true, does a simple and quick smoothing post-processing to the path

      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries::Spin"
    backup:
      plugin: "nav2_recoveries::BackUp"
    wait:
      plugin: "nav2_recoveries::Wait"

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 0.2
    source_timeout: 5.0
    stop_pub_count: 2

    # Define the sensing sources
    observation_sources: ["pointcloud_source"]
    pointcloud_source:
      type: "pointcloud"
      topic: "/obstacle_points" # The launch file will remap this to your actual topic
      min_height: 0.0
      max_height: 2.0
      enabled: True

    # Define the safety zones (Polygons)
    polygons: ["PolygonStop"]
    PolygonStop:
      type: "polygon"
      # Define a 0.6m x 0.6m stop box centered on the robot
      points: "[[0.3, 0.14], [0.3, -0.14], [-0.3, -0.14], [-0.3, 0.14]]"
      action_type: "stop"
      min_points: 4
      visualize: True
      polygon_pub_topic: "polygon_stop"

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "CLOSED_LOOP" # Use OPEN_LOOP if you don't have good wheel encoder feedback
    max_velocity: [0.5, 0.0, 1.57] # x, y, theta
    min_velocity: [-0.0, 0.0, -1.57]
    max_accel: [1.5, 0.0, 2.0]
    max_decel: [-1.5, 0.0, -2.0]
    odom_topic: "odom"
    robot_base_frame: "base_link"

# Default settings, we never really dock the robot
docking_server:
  ros__parameters:
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5

    # Types of docks
    dock_plugins: ["simple_charging_dock"]
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false # true
      use_stall_detection: false # true

      external_detection_timeout: 1.0
      external_detection_translation_x: -0.18
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1

    # Dock instances
    # The following example illustrates configuring dock instances.
    # docks: ['home_dock']  # Input your docks here
    # home_dock:
    #   type: 'simple_charging_dock'
    #   frame: map
    #   pose: [0.0, 0.0, 0.0]

    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.15
      v_linear_max: 0.15
